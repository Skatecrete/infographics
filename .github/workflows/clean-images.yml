name: clean-images

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: write

jobs:
  clean-images:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Delete all files except placeholder.png
      run: |
        cd images
        # Delete all files except placeholder.png
        for file in *; do
          if [ "$file" != "placeholder.png" ]; then
            rm -f "$file"
          fi
        done
        ls -la
        
    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add .
        git commit -m "Clean: Removed all infographics except placeholder"
        git push
